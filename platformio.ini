[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

upload_port = COM15
monitor_port = COM15
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21

build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D MQTT_MAX_PACKET_SIZE=512